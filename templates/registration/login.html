{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Login | TaskManager{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<div class="auth-page-wrapper">
    <div class="row justify-content-center">
        <div class="col-lg-4 col-md-6">
            <div class="card border-0 shadow-lg" style="border-radius: 16px;">
                <div class="card-body p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <span class="brand-icon d-inline-flex" style="width: 56px; height: 56px; font-size: 1.5rem;"><i class="bi bi-kanban-fill"></i></span>
                    </div>
                    <h1 class="h3 text-center mb-4">Welcome back</h1>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button class="btn btn-primary w-100 py-2" type="submit" style="border-radius: 8px;">Sign in</button>
                    </form>
                    <div class="mt-4 text-center small">
                        <a href="{% url 'tasks:password_reset' %}" class="text-decoration-none" style="color: var(--accent);">Forgot password?</a>
                        <span class="mx-2">·</span>
                        <a href="{% url 'tasks:register' %}" class="text-decoration-none" style="color: var(--accent);">Create account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
