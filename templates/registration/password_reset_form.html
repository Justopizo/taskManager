{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Password Reset | TaskManager{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Reset password</h1>
                <p class="text-muted">Development emails are printed to the console backend.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button class="btn btn-primary" type="submit">Send reset link</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
