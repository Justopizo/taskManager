{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Create Team | TaskManager{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Create a team</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button class="btn btn-primary" type="submit">Create team</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
