{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{% if object %}Edit Task{% else %}Create Task{% endif %} | TaskManager{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">{% if object %}Edit task{% else %}Create task{% endif %}</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Save</button>
                        <a class="btn btn-outline-secondary" href="{% url 'tasks:task_list' %}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
